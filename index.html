<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Bus Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            overflow-x: hidden;
        }

        .header {
            background: #16213e;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #0f3460;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #e94560;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .toolbar {
            background: #16213e;
            padding: 10px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #0f3460;
        }

        select, button, input[type="file"] {
            background: #0f3460;
            color: #eee;
            border: 1px solid #1a1a2e;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        select:hover, button:hover {
            background: #e94560;
            border-color: #e94560;
        }

        .file-input-wrapper {
            position: relative;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .file-input-wrapper .file-btn {
            background: #0f3460;
            color: #eee;
            border: 1px solid #1a1a2e;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .file-input-wrapper .file-btn:hover {
            background: #e94560;
            border-color: #e94560;
        }

        .viewport-container {
            width: 100%;
            height: calc(100vh - 280px);
            min-height: 400px;
            position: relative;
            background: #1a1a2e;
        }

        #viewport {
            width: 100%;
            height: 100%;
            display: block;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
        }

        .loading-overlay.visible {
            display: flex;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #0f3460;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 15px;
            font-size: 14px;
        }

        .progress-bar {
            width: 200px;
            height: 4px;
            background: #0f3460;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #e94560;
            width: 0%;
            transition: width 0.2s;
        }

        .controls-panel {
            background: #16213e;
            padding: 15px 20px;
            border-bottom: 1px solid #0f3460;
        }

        .controls-row {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group label {
            font-size: 14px;
            color: #aaa;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #e94560;
        }

        input[type="color"] {
            width: 40px;
            height: 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: none;
        }

        .info-panel {
            background: #0f3460;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 13px;
            color: #aaa;
        }

        .info-panel span {
            color: #eee;
        }

        .footer {
            background: #16213e;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .footer-buttons {
            display: flex;
            gap: 10px;
        }

        .footer-text {
            font-size: 12px;
            color: #666;
        }

        .footer-text a {
            color: #e94560;
            text-decoration: none;
        }

        .error-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #e94560;
            color: white;
            padding: 12px 20px;
            border-radius: 4px;
            display: none;
            z-index: 100;
            animation: fadeIn 0.3s ease;
        }

        .error-toast.visible {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .fullscreen-btn {
            padding: 6px 10px;
        }

        .keyboard-hint {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .toolbar {
                padding: 8px 10px;
                gap: 8px;
            }

            .controls-row {
                gap: 10px;
            }

            .viewport-container {
                height: calc(100vh - 320px);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>3D Bus Viewer</h1>
        <div class="header-actions">
            <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Fullscreen (F)">⛶</button>
            <button onclick="showHelp()" title="Help (?)">?</button>
        </div>
    </div>

    <div class="toolbar">
        <label for="model-select">Model:</label>
        <select id="model-select">
            <option value="">-- Select Model --</option>
            <option value="models/3dbus/BUS.obj">Generic Bus (ajanhallinta)</option>
            <option value="models/publictransport/Bus.obj">LowPoly Bus (quaternius)</option>
            <option value="models/schoolbus/SchoolBus.obj">School Bus (quaternius)</option>
        </select>

        <div class="file-input-wrapper">
            <input type="file" id="file-input" accept=".obj,.glb,.gltf">
            <button class="file-btn" onclick="document.getElementById('file-input').click()">📁 Load Local File</button>
        </div>
    </div>

    <div class="viewport-container">
        <canvas id="viewport"></canvas>
        <div class="loading-overlay" id="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading model...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="controls-row">
            <div class="control-group">
                <label for="lighting-select">Lighting:</label>
                <select id="lighting-select" onchange="setLighting(this.value)">
                    <option value="studio">Studio</option>
                    <option value="outdoor">Outdoor</option>
                    <option value="night">Night</option>
                </select>
            </div>

            <div class="control-group">
                <label>
                    <input type="checkbox" id="wireframe-toggle" onchange="toggleWireframe(this.checked)">
                    Wireframe
                </label>
            </div>

            <div class="control-group">
                <label>
                    <input type="checkbox" id="grid-toggle" checked onchange="toggleGrid(this.checked)">
                    Grid
                </label>
            </div>

            <div class="control-group">
                <label>
                    <input type="checkbox" id="axes-toggle" onchange="toggleAxes(this.checked)">
                    Axes
                </label>
            </div>

            <div class="control-group">
                <label for="color-picker">Body Color:</label>
                <input type="color" id="color-picker" value="#e94560" onchange="setModelColor(this.value)">
            </div>
        </div>

        <div class="info-panel" id="model-info">
            Model Info: <span id="info-vertices">-</span> vertices | <span id="info-faces">-</span> faces | 
            Bounding: <span id="info-bounds">-</span>
        </div>
    </div>

    <div class="footer">
        <div class="footer-buttons">
            <button onclick="takeScreenshot()">📷 Screenshot</button>
            <button onclick="resetView()">🔄 Reset View</button>
        </div>
        <div class="footer-text">
            Models: <a href="https://opengameart.org" target="_blank">OpenGameArt</a> (CC0) | 
            Engine: <a href="https://threejs.org" target="_blank">Three.js</a> |
            <span class="keyboard-hint">Keys: R=Reset, F=Fullscreen</span>
        </div>
    </div>

    <div class="error-toast" id="error-toast"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls;
        let currentModel = null;
        let gridHelper = null;
        let axesHelper = null;
        let wireframeMesh = null;
        let ambientLight, directionalLight, fillLight, backLight;

        const objLoader = new OBJLoader();
        const mtlLoader = new MTLLoader();
        const gltfLoader = new GLTFLoader();

        const BUNDLED_MODELS = {
            'models/3dbus/BUS.obj': { mtl: 'models/3dbus/BUS.mtl', name: 'Generic Bus' },
            'models/publictransport/Bus.obj': { mtl: 'models/publictransport/Bus.mtl', name: 'LowPoly Bus' },
            'models/schoolbus/SchoolBus.obj': { mtl: 'models/schoolbus/SchoolBus.mtl', name: 'School Bus' }
        };

        function init() {
            const canvas = document.getElementById('viewport');
            const container = canvas.parentElement;

            renderer = new THREE.WebGLRenderer({
                canvas: canvas,
                antialias: true,
                preserveDrawingBuffer: true
            });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);

            camera = new THREE.PerspectiveCamera(
                45,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            camera.position.set(5, 3, 5);

            controls = new OrbitControls(camera, canvas);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 2;
            controls.maxDistance = 20;
            controls.target.set(0, 0, 0);

            setupLights();
            setupGround();

            axesHelper = new THREE.AxesHelper(2);
            axesHelper.visible = false;
            scene.add(axesHelper);

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', onKeyDown);

            document.getElementById('model-select').addEventListener('change', (e) => {
                if (e.target.value) {
                    loadBundledModel(e.target.value);
                }
            });

            document.getElementById('file-input').addEventListener('change', handleFileUpload);

            animate();
        }

        function setupLights() {
            ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 5);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            directionalLight.shadow.camera.near = 0.5;
            directionalLight.shadow.camera.far = 50;
            directionalLight.shadow.camera.left = -10;
            directionalLight.shadow.camera.right = 10;
            directionalLight.shadow.camera.top = 10;
            directionalLight.shadow.camera.bottom = -10;
            scene.add(directionalLight);

            fillLight = new THREE.PointLight(0xffffff, 0.3);
            fillLight.position.set(-5, 3, -5);
            scene.add(fillLight);

            backLight = new THREE.PointLight(0xffffff, 0.2);
            backLight.position.set(0, -2, -5);
            scene.add(backLight);
        }

        function setupGround() {
            gridHelper = new THREE.GridHelper(10, 20, 0x444444, 0x222222);
            scene.add(gridHelper);

            const groundGeo = new THREE.PlaneGeometry(10, 10);
            const groundMat = new THREE.ShadowMaterial({ opacity: 0.3 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.01;
            ground.receiveShadow = true;
            scene.add(ground);
        }

        function setLighting(preset) {
            switch (preset) {
                case 'studio':
                    ambientLight.intensity = 0.5;
                    directionalLight.intensity = 1;
                    directionalLight.color.setHex(0xffffff);
                    fillLight.intensity = 0.3;
                    backLight.intensity = 0.2;
                    scene.background.setHex(0x1a1a2e);
                    break;
                case 'outdoor':
                    ambientLight.intensity = 0.8;
                    directionalLight.intensity = 1.5;
                    directionalLight.color.setHex(0xffffcc);
                    fillLight.intensity = 0.5;
                    backLight.intensity = 0.3;
                    scene.background.setHex(0x87ceeb);
                    break;
                case 'night':
                    ambientLight.intensity = 0.2;
                    directionalLight.intensity = 0.3;
                    directionalLight.color.setHex(0x4444aa);
                    fillLight.intensity = 0.1;
                    backLight.intensity = 0.05;
                    scene.background.setHex(0x0a0a1e);
                    break;
            }
        }

        function loadBundledModel(path) {
            showLoading(true);
            const modelInfo = BUNDLED_MODELS[path];

            if (modelInfo && modelInfo.mtl) {
                mtlLoader.load(modelInfo.mtl, (materials) => {
                    materials.preload();
                    objLoader.setMaterials(materials);
                    loadOBJ(path);
                }, undefined, (error) => {
                    console.warn('MTL load failed, loading OBJ without materials:', error);
                    objLoader.setMaterials(null);
                    loadOBJ(path);
                });
            } else {
                objLoader.setMaterials(null);
                loadOBJ(path);
            }
        }

        function loadOBJ(path) {
            objLoader.load(path, (obj) => {
                addModelToScene(obj);
                showLoading(false);
            }, onProgress, (error) => {
                showError('Failed to load model: ' + error.message);
                showLoading(false);
            });
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            const ext = file.name.split('.').pop().toLowerCase();

            showLoading(true);
            updateProgress(0);

            if (ext === 'glb' || ext === 'gltf') {
                gltfLoader.load(url, (gltf) => {
                    addModelToScene(gltf.scene);
                    URL.revokeObjectURL(url);
                    showLoading(false);
                }, onProgress, (error) => {
                    showError('Failed to load GLB/GLTF: ' + error.message);
                    URL.revokeObjectURL(url);
                    showLoading(false);
                });
            } else if (ext === 'obj') {
                objLoader.setMaterials(null);
                objLoader.load(url, (obj) => {
                    applyDefaultMaterial(obj);
                    addModelToScene(obj);
                    URL.revokeObjectURL(url);
                    showLoading(false);
                }, onProgress, (error) => {
                    showError('Failed to load OBJ: ' + error.message);
                    URL.revokeObjectURL(url);
                    showLoading(false);
                });
            } else {
                showError('Unsupported format. Use .obj, .glb, or .gltf');
                showLoading(false);
            }

            event.target.value = '';
        }

        function applyDefaultMaterial(obj) {
            const defaultMat = new THREE.MeshStandardMaterial({
                color: 0xe94560,
                metalness: 0.3,
                roughness: 0.7
            });

            obj.traverse((child) => {
                if (child.isMesh) {
                    child.material = defaultMat.clone();
                }
            });
        }

        function addModelToScene(model) {
            if (currentModel) {
                scene.remove(currentModel);
                if (wireframeMesh) {
                    scene.remove(wireframeMesh);
                    wireframeMesh = null;
                }
            }

            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            const box = new THREE.Box3().setFromObject(model);
            const center = new THREE.Vector3();
            const size = new THREE.Vector3();
            box.getCenter(center);
            box.getSize(size);

            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 3 / maxDim;
            model.scale.multiplyScalar(scale);

            box.setFromObject(model);
            box.getCenter(center);
            model.position.sub(center);
            model.position.y += size.y * scale / 2;

            currentModel = model;
            scene.add(model);

            updateModelInfo(model);

            camera.position.set(5, 3, 5);
            controls.target.set(0, 1, 0);
            controls.update();

            if (document.getElementById('wireframe-toggle').checked) {
                createWireframeOverlay();
            }
        }

        function updateModelInfo(model) {
            let vertices = 0, faces = 0;
            const box = new THREE.Box3().setFromObject(model);
            const size = new THREE.Vector3();
            box.getSize(size);

            model.traverse((child) => {
                if (child.isMesh && child.geometry) {
                    const geo = child.geometry;
                    if (geo.attributes.position) {
                        vertices += geo.attributes.position.count;
                    }
                    if (geo.index) {
                        faces += geo.index.count / 3;
                    } else if (geo.attributes.position) {
                        faces += geo.attributes.position.count / 3;
                    }
                }
            });

            document.getElementById('info-vertices').textContent = vertices;
            document.getElementById('info-faces').textContent = Math.floor(faces);
            document.getElementById('info-bounds').textContent = 
                `${size.x.toFixed(2)}m × ${size.y.toFixed(2)}m × ${size.z.toFixed(2)}m`;
        }

        function createWireframeOverlay() {
            if (!currentModel) return;

            if (wireframeMesh) {
                scene.remove(wireframeMesh);
            }

            wireframeMesh = currentModel.clone();
            wireframeMesh.traverse((child) => {
                if (child.isMesh) {
                    child.material = new THREE.MeshBasicMaterial({
                        color: 0x00ff00,
                        wireframe: true,
                        transparent: true,
                        opacity: 0.5
                    });
                }
            });
            scene.add(wireframeMesh);
        }

        function toggleWireframe(enabled) {
            if (enabled && currentModel) {
                createWireframeOverlay();
            } else if (wireframeMesh) {
                scene.remove(wireframeMesh);
                wireframeMesh = null;
            }
        }

        function toggleGrid(enabled) {
            if (gridHelper) {
                gridHelper.visible = enabled;
            }
        }

        function toggleAxes(enabled) {
            if (axesHelper) {
                axesHelper.visible = enabled;
            }
        }

        function setModelColor(colorHex) {
            if (!currentModel) return;

            const color = new THREE.Color(colorHex);
            currentModel.traverse((child) => {
                if (child.isMesh && child.material) {
                    if (child.material.color) {
                        child.material.color = color;
                    }
                }
            });
        }

        function resetView() {
            camera.position.set(5, 3, 5);
            controls.target.set(0, 1, 0);
            controls.update();
        }

        window.toggleFullscreen = function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        };

        window.takeScreenshot = function() {
            renderer.render(scene, camera);
            const link = document.createElement('a');
            link.download = 'bus-viewer-screenshot.png';
            link.href = renderer.domElement.toDataURL('image/png');
            link.click();
        };

        window.showHelp = function() {
            alert(
                '3D Bus Viewer Help\n\n' +
                'Controls:\n' +
                '• Left click + drag: Rotate\n' +
                '• Right click + drag: Pan\n' +
                '• Scroll: Zoom\n\n' +
                'Keyboard:\n' +
                '• R: Reset view\n' +
                '• F: Toggle fullscreen\n\n' +
                'Load your own models:\n' +
                '• Supports .obj, .glb, .gltf files\n' +
                '• Files stay on your device (no upload)'
            );
        };

        window.setLighting = setLighting;
        window.toggleWireframe = toggleWireframe;
        window.toggleGrid = toggleGrid;
        window.toggleAxes = toggleAxes;
        window.setModelColor = setModelColor;
        window.resetView = resetView;

        function showLoading(visible) {
            const overlay = document.getElementById('loading');
            if (visible) {
                overlay.classList.add('visible');
            } else {
                overlay.classList.remove('visible');
                updateProgress(100);
            }
        }

        function updateProgress(percent) {
            document.getElementById('progress-fill').style.width = percent + '%';
        }

        function onProgress(xhr) {
            if (xhr.lengthComputable) {
                const percent = (xhr.loaded / xhr.total) * 100;
                updateProgress(percent);
            }
        }

        function showError(message) {
            const toast = document.getElementById('error-toast');
            toast.textContent = message;
            toast.classList.add('visible');
            setTimeout(() => {
                toast.classList.remove('visible');
            }, 5000);
        }

        function onWindowResize() {
            const container = document.getElementById('viewport').parentElement;
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function onKeyDown(event) {
            if (event.key.toLowerCase() === 'r') {
                resetView();
            } else if (event.key.toLowerCase() === 'f') {
                toggleFullscreen();
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
